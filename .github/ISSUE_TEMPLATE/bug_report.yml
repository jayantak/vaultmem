name: Bug report
description: Something in vaultmem isn't working as documented
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: vaultmem version
      description: output of `vaultmem -h` first line, or `git rev-parse HEAD` if built from source
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: dropdown
    id: doctor
    attributes:
      label: Does `vaultmem doctor` pass?
      options:
        - "yes (exit 0)"
        - "no — config errors"
        - "no — drift/schema-lint findings"
        - "didn't run it"
  - type: input
    id: command
    attributes:
      label: Exact command
      description: e.g. `vaultmem groom --dry-run`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true
