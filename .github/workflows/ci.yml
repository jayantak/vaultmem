name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: shellcheck + shfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck and shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          curl -fsSL -o /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64
          sudo chmod +x /usr/local/bin/shfmt
      - name: shellcheck
        run: shellcheck vaultmem install.sh tests/subcommand-lint.sh tests/bash32-lint.sh
      - name: shfmt --diff
        run: shfmt --diff vaultmem install.sh tests/subcommand-lint.sh tests/bash32-lint.sh
      # shellcheck has no bash-version target (only a dialect), so it cannot see
      # bash-4-only constructs. This names them explicitly; the bash-3.2 bats job
      # below is the broader net.
      - name: bash 3.2 floor lint
        run: ./tests/bash32-lint.sh

  test:
    name: bats (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep + bats (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ripgrep bats
      - name: Install ripgrep + bats (macOS)
        if: runner.os == 'macOS'
        run: brew install ripgrep bats-core
      - name: Run tests
        run: bats tests/vaultmem.bats

  bash32:
    name: bats under macOS system bash 3.2
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep + bats
        run: brew install ripgrep bats-core
      # The matrix job above runs whatever bash bats picks, which on macOS is
      # Homebrew's bash 5 (pulled in by bats-core) — so it does NOT exercise the
      # 3.2 floor. /bin/bash is the shell real users and the SessionStart hooks
      # get. A bash-4 construct that only breaks a specific code path (rather
      # than erroring at load time) is invisible to every other job.
      - name: Confirm /bin/bash really is 3.2
        run: /bin/bash --version | head -1 | grep -q 'version 3\.2' || exit 1
      - name: Run tests under bash 3.2
        env:
          BASH: /bin/bash
        run: bats tests/vaultmem.bats
      - name: Run the shipped lints under bash 3.2
        run: |
          /bin/bash ./tests/subcommand-lint.sh
          /bin/bash ./tests/bash32-lint.sh

  subcommand-lint:
    name: skills ↔ dispatch-table lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint skill subcommand references
        run: ./tests/subcommand-lint.sh
